name: perf gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # 6 URLs x 5 devtools-throttled runs (~20-30s each) + npm ci + next build
    # does not fit in 15 minutes; Phase 11 grew the collection from 2 to 6 URLs.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Verify hero asset budgets
        run: bash scripts/check-hero-assets.sh
      - name: Verify route JS budget
        run: bash scripts/check-route-js-budget.sh
      - name: Run Lighthouse CI
        run: npx --no-install lhci autorun
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
          retention-days: 7
